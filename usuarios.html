<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários</title>
</head>

<body onload="loadUsers()">

    <div>
        <h1>Lista de Usuários</h1>
        <label for="input_search">Buscar Usuário:</label>
        <input type="text" id="input_search" placeholder="id">
        <button onclick="filterUsers()">Buscar</button>
        <button onclick="loadUsers()">Recarregar</button>
        <ul id="ul_user_list"></ul>
        <a href="cadastro.html">Cadastrar Novo Usuário</a>

        <dialog id="dialog_edit" close>

            <h3 id="h3_title">
                Editar Usuário
            </h3>

            <label for="input_nome">Nome:</label>
            <input type="text" id="input_nome" name="input_nome">
            <br>

            <label for="input_email">Email:</label>
            <input type="email" id="input_email" name="input_email">
            <br>

            <label for="input_senha">Senha:</label>
            <input type="password" id="input_senha" name="input_senha">
            <br>

            <button onclick="dialog_edit.close()" type="reset">Fechar</button>

            <button onclick="saveUser()" id="button_dialog_save">Salvar</button>
        </dialog>
    </div>


    <script>

        function loadUsers() {
            fetch("http://localhost:8080/usuarios")
                .then(response => response.json())
                .then(users => {
                    console.log(users);
                    let listUsersMessage = ''

                    users.forEach(user => {
                        console.log(user);
                        listUsersMessage += `<li>
                            ${user.id} - ${user.nome} - ${user.email} - 
                            <button onclick="deleteUser(${user.id})">Excluir</button> - 
                            <button onclick="editUser(${user.id})">Editar</button></li>`;
                    });

                    ul_user_list.innerHTML = listUsersMessage;
                })
                .catch(error => console.error("Erro ao carregar usuários:", error));
        }

        function deleteUser(userId) {
            fetch(`http://localhost:8080/usuarios/${userId}`, {
                method: "DELETE"
            })
                .then(response => {
                    if (response.ok) {
                        alert("Usuário deletado com sucesso!");
                        loadUsers(); // Recarrega a lista de usuários após a exclusão
                    } else {
                        alert("Erro ao deletar usuário!");
                    }
                })
                .catch(error => console.error("Erro ao deletar usuário:", error));
        }

        function editUser(userId) {
            fetch(`http://localhost:8080/usuarios/${userId}`)
                .then(response => response.json())
                .then(user => {
                    console.log(user);
                    input_nome.value = user.nome;
                    input_email.value = user.email;
                    input_senha.value = user.senha;

                    dialog_edit.showModal();

                    dialog_edit.querySelector("#button_dialog_save").onclick = function () {
                        saveUser(userId);
                    };
                })
                .catch(error => console.error("Erro ao buscar usuário:", error));
        }

        function saveUser(userId) {
            const nome = input_nome.value;
            const email = input_email.value;
            const senha = input_senha.value;

            fetch(`http://localhost:8080/usuarios/${userId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ nome, email, senha })
            })
                .then(response => {

                    if (response.status === 409) {
                        alert("Email já cadastrado para outro usuário!");
                        return;
                    }

                    if (response.ok) {
                        alert("Usuário atualizado com sucesso!");
                        dialog_edit.close();
                        loadUsers(); // Recarrega a lista de usuários após a atualização
                    } else {
                        alert("Erro ao atualizar usuário!");
                    }
                })
                .catch(error => console.error("Erro ao atualizar usuário:", error));
        }

        function filterUsers() {
            const userId = input_search.value.toLowerCase();
            fetch(`http://localhost:8080/usuarios/${userId}`)
                .then(response => response.json())
                .then(user => {
                    console.log(user);
                    let listUsersMessage = ''

                    listUsersMessage += `<li>${user.id} - ${user.nome} - ${user.email} - <button onclick="deleteUser(${user.id})">Excluir</button> - <button onclick="editUser(${user.id})">Editar</button></li>`;

                    ul_user_list.innerHTML = listUsersMessage;
                })
                .catch(error => {
                    ul_user_list.innerHTML = '<li>Nenhum usuário encontrado</li>';
                    input_search.value = '';
                });

        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString("pt-BR", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric"
            });
        }

        function formatCurrency(value) {
            // plus 1 day
            value = new Date(value);
            value.setDate(value.getDate() + 1);

            console.log(value);

            return value.toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
            });
        }

        function formatPhone(phone) {
            return phone.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
        }

    </script>
</body>

</html>
